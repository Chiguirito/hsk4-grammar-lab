name: Validate
on:
  pull_request:
  workflow_dispatch:
# least privilege — this workflow executes PR-authored data files via node,
# so it must never carry more than read access (and never any secrets)
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate topic data files
        run: node scripts/validate.js
      - name: Check generated shells are up to date
        run: node scripts/build-shells.js --check
